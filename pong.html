<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
  body {
    margin: 0;
    background: #0d0d0d;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  #titleScreen {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 25px;
  }

  #titleScreen h1 {
    font-size: 60px;
    letter-spacing: 4px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px #00eaff;
  }

  .menuBtn {
    padding: 15px 40px;
    font-size: 22px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #00aaff;
    color: black;
    font-weight: bold;
    transition: 0.2s;
  }

  .menuBtn:hover {
    background: #00eaff;
    transform: scale(1.05);
  }

  #game {
    display: none;
    background: #111;
    border: 3px solid white;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  #roomUI {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
  }

  #roomUI input {
    padding: 10px;
    font-size: 18px;
    width: 250px;
    border-radius: 6px;
    border: none;
  }

  #roomUI button {
    padding: 10px 25px;
    font-size: 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #00aaff;
    color: black;
    font-weight: bold;
  }

  #roomUI button:hover {
    background: #00eaff;
  }

  #status {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
  }

  #scoreUI {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 32px;
    letter-spacing: 4px;
    display: none;
  }
</style>
</head>
<body>

<div id="titleScreen">
  <h1>PONG</h1>
  <button class="menuBtn" id="onePlayerBtn">1 Player (vs BOT)</button>
  <button class="menuBtn" id="twoLocalBtn">2 Player Local</button>
  <button class="menuBtn" id="twoOnlineBtn">2 Player Online</button>
</div>

<div id="roomUI">
  <h2>Online Match</h2>
  <input id="roomCode" placeholder="Room Code (ABC123)">
  <button id="createRoom">Create Room</button>
  <button id="joinRoom">Join Room</button>
  <div id="status"></div>
</div>

<div id="scoreUI">0 : 0</div>

<canvas id="game" width="800" height="500"></canvas>

<script>
const titleScreen = document.getElementById("titleScreen");
const roomUI = document.getElementById("roomUI");
const gameCanvas = document.getElementById("game");
const scoreUI = document.getElementById("scoreUI");
const ctx = gameCanvas.getContext("2d");

const onePlayerBtn = document.getElementById("onePlayerBtn");
const twoLocalBtn = document.getElementById("twoLocalBtn");
const twoOnlineBtn = document.getElementById("twoOnlineBtn");
const roomCodeInput = document.getElementById("roomCode");
const createRoomBtn = document.getElementById("createRoom");
const joinRoomBtn = document.getElementById("joinRoom");
const statusEl = document.getElementById("status");

let mode = "local";
let socket = null;
let inRoom = false;
let playerIndex = null;
let isHost = false;

const W = gameCanvas.width;
const H = gameCanvas.height;

const paddleW = 12;
const paddleH = 90;
const paddleSpeed = 6;

const left = { x: 20, y: H/2 - paddleH/2 };
const right = { x: W - 20 - paddleW, y: H/2 - paddleH/2 };

const ball = { x: W/2, y: H/2, size: 12, dx: 5, dy: 4 };

let scoreL = 0;
let scoreR = 0;

function resetBall() {
  ball.x = W/2;
  ball.y = H/2;
  ball.dx = Math.random() > 0.5 ? 5 : -5;
  ball.dy = (Math.random() * 4 + 2) * (Math.random() > 0.5 ? 1 : -1);
}

function resetGame() {
  left.y = H/2 - paddleH/2;
  right.y = H/2 - paddleH/2;
  scoreL = 0;
  scoreR = 0;
  resetBall();
}

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

onePlayerBtn.onclick = () => startGame("bot");
twoLocalBtn.onclick = () => startGame("local");
twoOnlineBtn.onclick = () => {
  mode = "online";
  titleScreen.style.display = "none";
  roomUI.style.display = "flex";
};

function startGame(m) {
  mode = m;
  titleScreen.style.display = "none";
  roomUI.style.display = "none";
  gameCanvas.style.display = "block";
  scoreUI.style.display = "block";
  resetGame();
}

function botAI() {
  const target = ball.y - paddleH/2 + ball.size/2;
  const diff = target - right.y;
  right.y += diff * 0.08;
}

function updateLocal() {
  if (mode !== "online") {
    if (keys["w"]) left.y -= paddleSpeed;
    if (keys["s"]) left.y += paddleSpeed;
  }

  if (mode === "local") {
    if (keys["ArrowUp"]) right.y -= paddleSpeed;
    if (keys["ArrowDown"]) right.y += paddleSpeed;
  }

  if (mode === "bot") botAI();

  left.y = Math.max(0, Math.min(H - paddleH, left.y));
  right.y = Math.max(0, Math.min(H - paddleH, right.y));

  ball.x += ball.dx;
  ball.y += ball.dy;

  if (ball.y <= 0 || ball.y + ball.size >= H) ball.dy *= -1;

  if (ball.x <= left.x + paddleW &&
      ball.y + ball.size >= left.y &&
      ball.y <= left.y + paddleH) ball.dx = Math.abs(ball.dx);

  if (ball.x + ball.size >= right.x &&
      ball.y + ball.size >= right.y &&
      ball.y <= right.y + paddleH) ball.dx = -Math.abs(ball.dx);

  if (ball.x < 0) { scoreR++; resetBall(); }
  if (ball.x > W) { scoreL++; resetBall(); }

  scoreUI.textContent = `${scoreL} : ${scoreR}`;
}

function updateOnline() {
  if (!inRoom) return;

  if (playerIndex === 0) {
    if (keys["w"]) left.y -= paddleSpeed;
    if (keys["s"]) left.y += paddleSpeed;
  } else if (playerIndex === 1) {
    if (keys["ArrowUp"]) right.y -= paddleSpeed;
    if (keys["ArrowDown"]) right.y += paddleSpeed;
  }

  left.y = Math.max(0, Math.min(H - paddleH, left.y));
  right.y = Math.max(0, Math.min(H - paddleH, right.y));

  if (isHost) {
    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.y <= 0 || ball.y + ball.size >= H) ball.dy *= -1;

    if (ball.x <= left.x + paddleW &&
        ball.y + ball.size >= left.y &&
        ball.y <= left.y + paddleH) ball.dx = Math.abs(ball.dx);

    if (ball.x + ball.size >= right.x &&
        ball.y + ball.size >= right.y &&
        ball.y <= right.y + paddleH) ball.dx = -Math.abs(ball.dx);

    if (ball.x < 0) { scoreR++; resetBall(); }
    if (ball.x > W) { scoreL++; resetBall(); }

    scoreUI.textContent = `${scoreL} : ${scoreR}`;

    sendWS({
      type: "state",
      state: {
        ball: { x: ball.x, y: ball.y },
        left: { y: left.y },
        right: { y: right.y },
        scoreL,
        scoreR
      }
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "white";
  ctx.fillRect(left.x, left.y, paddleW, paddleH);
  ctx.fillRect(right.x, right.y, paddleW, paddleH);
  ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
}

function loop() {
  if (mode === "local" || mode === "bot") {
    updateLocal();
  } else if (mode === "online") {
    updateOnline();
  }
  draw();
  requestAnimationFrame(loop);
}
loop();

/* ---------- ONLINE (Render) ---------- */

function connectWS() {
  // Replace YOUR_SERVICE_NAME with your Render hostname, e.g. pong.onrender.com
  socket = new WebSocket("wss://YOUR_SERVICE_NAME");

  socket.onopen = () => {
    statusEl.textContent = "Connected. Enter a room code.";
  };

  socket.onmessage = e => {
    const data = JSON.parse(e.data);

    if (data.type === "error") {
      statusEl.textContent = "Error: " + data.message;
    }

    if (data.type === "joined") {
      inRoom = true;
      playerIndex = data.playerIndex;
      isHost = (playerIndex === 0);
      statusEl.textContent = `In room ${data.code} as Player ${playerIndex + 1}`;
      roomUI.style.display = "none";
      gameCanvas.style.display = "block";
      scoreUI.style.display = "block";
      resetGame();
    }

    if (data.type === "ready") {
      statusEl.textContent = "Both players ready. Game starting!";
    }

    if (data.type === "state") {
      const s = data.state;
      ball.x = s.ball.x;
      ball.y = s.ball.y;
      left.y = s.left.y;
      right.y = s.right.y;
      scoreL = s.scoreL;
      scoreR = s.scoreR;
      scoreUI.textContent = `${scoreL} : ${scoreR}`;
    }
  };

  socket.onclose = () => {
    statusEl.textContent = "Disconnected from server.";
    inRoom = false;
  };
}

function sendWS(obj) {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify(obj));
  }
}

createRoomBtn.onclick = () => {
  if (!socket || socket.readyState !== WebSocket.OPEN) connectWS();
  const code = roomCodeInput.value.trim() || "ROOM";
  sendWS({ type: "create", code });
};

joinRoomBtn.onclick = () => {
  if (!socket || socket.readyState !== WebSocket.OPEN) connectWS();
  const code = roomCodeInput.value.trim();
  if (!code) {
    statusEl.textContent = "Enter a room code to join.";
    return;
  }
  sendWS({ type: "join", code });
};
</script>
</body>
</html>
